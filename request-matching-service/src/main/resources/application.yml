server:
  port: 8085

spring:
  application:
    name: request-matching-service
  datasource:
    url: jdbc:postgresql://localhost:5437/request_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

services:
  user-service-url: http://localhost:8081
  offer-service-url: http://localhost:8082
  booking-service-url: http://localhost:8083
