version: '3.8'

services:
  # ─── Infrastructure ───────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    user: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  user-db:
    image: postgres:15
    container_name: user-db
    environment:
      POSTGRES_DB: user_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - user-db-data:/var/lib/postgresql/data

  offer-db:
    image: postgres:15
    container_name: offer-db
    environment:
      POSTGRES_DB: offer_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - offer-db-data:/var/lib/postgresql/data

  booking-db:
    image: postgres:15
    container_name: booking-db
    environment:
      POSTGRES_DB: booking_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - booking-db-data:/var/lib/postgresql/data

  notification-db:
    image: postgres:15
    container_name: notification-db
    environment:
      POSTGRES_DB: notification_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5436:5432"
    volumes:
      - notification-db-data:/var/lib/postgresql/data

  request-db:
    image: postgres:15
    container_name: request-db
    environment:
      POSTGRES_DB: request_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5437:5432"
    volumes:
      - request-db-data:/var/lib/postgresql/data

  # ─── Microservices ────────────────────────────────────────────────
  user-service:
    build: ./user-service
    container_name: user-service
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://user-db:5432/user_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
    depends_on:
      user-db:
        condition: service_started
      rabbitmq:
        condition: service_healthy

  service-offer-service:
    build: ./service-offer-service
    container_name: service-offer-service
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://offer-db:5432/offer_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
      SERVICES_USER_SERVICE_URL: http://user-service:8081
    depends_on:
      offer-db:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      user-service:
        condition: service_started

  booking-service:
    build: ./booking-service
    container_name: booking-service
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://booking-db:5432/booking_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
      SERVICES_USER_SERVICE_URL: http://user-service:8081
      SERVICES_OFFER_SERVICE_URL: http://service-offer-service:8082
    depends_on:
      booking-db:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      user-service:
        condition: service_started
      service-offer-service:
        condition: service_started

  notification-service:
    build: ./notification-service
    container_name: notification-service
    ports:
      - "8084:8084"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://notification-db:5432/notification_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
    depends_on:
      notification-db:
        condition: service_started
      rabbitmq:
        condition: service_healthy

  request-matching-service:
    build: ./request-matching-service
    container_name: request-matching-service
    ports:
      - "8085:8085"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://request-db:5432/request_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
      SERVICES_USER_SERVICE_URL: http://user-service:8081
      SERVICES_OFFER_SERVICE_URL: http://service-offer-service:8082
      SERVICES_BOOKING_SERVICE_URL: http://booking-service:8083
    depends_on:
      request-db:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      user-service:
        condition: service_started
      service-offer-service:
        condition: service_started
      booking-service:
        condition: service_started

volumes:
  user-db-data:
  offer-db-data:
  booking-db-data:
  notification-db-data:
  request-db-data: